spring.application.name=product-review
server.port=${PORT:8080}

# H2 Database Configuration
# Using in-memory database with DB_CLOSE_DELAY=-1 to keep it alive
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=ProductReviewPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

# Flyway (disabled for H2 dev; enabled in prod profile for PostgreSQL)
spring.flyway.enabled=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# Console enabled (for debugging locally)
spring.h2.console.enabled=true

# Clerk Authentication Configuration
clerk.secret.key=${CLERK_SECRET_KEY:your-clerk-secret-key-here}
clerk.publishable.key=${CLERK_PUBLISHABLE_KEY:your-clerk-publishable-key-here}

# ? OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:your-api-key-here}
openai.model=gpt-4o-mini
openai.max.tokens=500

# ? Cache Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=1h

# Rate Limiting
rate-limit.requests-per-minute=60

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# CORS Configuration
cors.allowed-origins=http://localhost:19006,http://localhost:8081,http://localhost:3000

# ? Actuator Configuration (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

