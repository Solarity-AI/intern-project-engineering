# Production profile overrides

# PostgreSQL Datasource
# Render provides DATABASE_URL in postgres:// format; render.yaml start command
# converts it to JDBC format and exports JDBC_DATABASE_URL.
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA / Hibernate - Flyway manages schema; dialect auto-detected from driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=false

# Flyway (enabled for PostgreSQL migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Disable H2 console in production
spring.h2.console.enabled=false

# Disable SQL logging
spring.jpa.show-sql=false

# CORS - production origins (set CORS_ALLOWED_ORIGINS env var on Render)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# HikariCP - tuned for Render free tier (limited RAM, single vCPU)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.leak-detection-threshold=0

# Disable Swagger UI in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator - restrict endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Clerk Authentication (required in production)
clerk.secret.key=${CLERK_SECRET_KEY}
clerk.publishable.key=${CLERK_PUBLISHABLE_KEY}
