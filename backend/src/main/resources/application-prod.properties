# Production profile overrides

# PostgreSQL Datasource
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA / Hibernate - validate schema against Flyway migrations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=false

# Flyway (enabled for PostgreSQL migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Disable H2 console in production
spring.h2.console.enabled=false

# Disable SQL logging
spring.jpa.show-sql=false

# CORS - production origins
cors.allowed-origins=https://product-review-app.vercel.app,https://product-review-app-ybmf.onrender.com

# HikariCP - tuned for Render.com free tier (512MB RAM, single vCPU)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.leak-detection-threshold=0

# Disable Swagger UI in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator - restrict endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
