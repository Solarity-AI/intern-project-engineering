name: Deploy to Heroku

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Backend to Heroku
        run: |
          git subtree split --prefix=backend -b deploy-backend
          git push -f https://heroku:${{ secrets.HEROKU_API_KEY }}@git.heroku.com/${{ secrets.HEROKU_BACKEND_APP }}.git deploy-backend:main

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Build project
        working-directory: ./mobile
        run: npm run build
        env:
          EXPO_PUBLIC_API_URL: https://${{ secrets.HEROKU_BACKEND_APP }}.herokuapp.com

      - name: Deploy Frontend to Heroku
        working-directory: ./mobile
        run: |
          mkdir deploy
          cp -r dist Procfile deploy/
          echo '{"name":"solarity-review-web","version":"1.0.0","dependencies":{"serve":"^14.2.4"}}' > deploy/package.json
          cd deploy
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy"
          git push -f https://heroku:${{ secrets.HEROKU_API_KEY }}@git.heroku.com/${{ secrets.HEROKU_FRONTEND_APP }}.git main
